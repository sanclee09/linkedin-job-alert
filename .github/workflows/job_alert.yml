name: LinkedIn Job Alert

on:
  schedule:
    # Every day at 06:00 UTC = 08:00 CEST (summer) / 07:00 CET (winter)
    - cron: "0 6 * * *"
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  send-job-alert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore seen-jobs cache
        uses: actions/cache@v4
        with:
          path: ~/.linkedin_job_alert_seen.json
          # Update cache key daily so it never expires but always restores
          key: seen-jobs-${{ github.run_id }}
          restore-keys: seen-jobs-

      - name: Run job alert
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python job_alert.py
